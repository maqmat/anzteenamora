  <body>
    <!-- Pantalla de Carga Inmersiva (Preloader) -->
    <div id="preloader" class="page-preloader">
      <div class="preloader-content">
        <div class="preloader-title-wrapper">

        </div>

        </div>
        <div class="preloader-status">Cargando Experiencia Inmersiva</div>
      </div>

    <!-- Cursor/Feedback Táctil Awwwards -->

        <button class="back-btn hidden" id="header-back-btn">
          <span class="back-btn-arrow">←</span>
          <span>Volver</span>
        </button>
      </div>
    </header>

    <!-- Contenedor Principal SPA -->
    <main id="app">
      <!-- El contenido de la página de inicio o detalles se inyectará aquí -->
    </main>

    <!-- Filtro SVG de Distorsión Líquida (Efecto WebGL Shaders) -->
    <svg class="liquid-svg-filter" style="position: absolute; width: 0; height: 0; pointer-events: none;" width="0" height="0">
      <defs>
        <filter id="liquid-distortion">
          <feTurbulence type="fractalNoise" baseFrequency="0.015 0.04" numOctaves="2" result="noise" />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G" id="liquid-displacement" />
        </filter>
      </defs>
    </svg>
